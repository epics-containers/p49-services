apiVersion: v2
name: p49-tiled
description: Tiled deployed for p49
version: 1.0.0

# When we deploy with the edge-containers-cli we override this on the command line.
# Direct deployment with Helm will use the default beta value.
appVersion: 0.0.1b1

type: application

dependencies:
  - name: tiled
    version: "0.2.2"
    repository: "oci://ghcr.io/bluesky/charts"

  - name: glazed
    version: "0.1.1"
    repository: "oci://ghcr.io/diamondlightsource/charts"

  - name: oauth2-proxy
    alias: oauth2
    repository: https://oauth2-proxy.github.io/manifests
    version: 10.1.4

  - name: postgres
    version: 1.6.1
    repository: https://groundhog2k.github.io/helm-charts/

